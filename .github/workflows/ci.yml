name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    name: backend · pytest + eval smoke
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies (demo mode — no ML stack)
        run: pip install -r requirements.txt

      - name: Run tests
        run: pytest -q

      - name: Dataset + eval smoke (stdlib only, --demo)
        run: |
          python scripts/create_dataset_manifest.py --demo --out data/manifest.csv
          python scripts/extract_keypoints.py --manifest data/manifest.csv --out data/keypoints
          python scripts/split_dataset.py --manifest data/manifest.csv --out data/splits
          python scripts/validate_dataset.py --manifest data/manifest.csv --keypoints data/keypoints
          python eval/action_accuracy.py --demo
          python eval/handoff_prf.py --demo
          python eval/trajectory_ade_fde.py --demo
          python eval/runtime_bench.py --demo

  frontend:
    name: frontend · typecheck + build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build (tsc -b + vite build)
        run: npm run build
